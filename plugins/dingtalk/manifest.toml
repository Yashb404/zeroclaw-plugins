name = "dingtalk"
version = "0.1.0"
description = "DingTalk Stream Mode channel plugin for ZeroClaw: gateway WebSocket + session-webhook replies."
author = "JordanTheJet"
wasm_path = "dingtalk.wasm"
capabilities = ["channel"]
sender_match = "exact"
# Real implementation, kept source-only until ZeroClaw's websocket-client host
# capability reaches upstream master.
registry = false
# http_client: gateway registration and per-message session-webhook replies.
# websocket_client: DingTalk Stream Mode callback frames.
# config_read: read [channels.dingtalk.*] when loaded as a mirror plugin.
permissions = ["http_client", "websocket_client", "config_read"]
# provides: mirror the built-in `dingtalk` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "dingtalk"
